    <main class="py-3 mb-auto flex-fill">
        <div class="container p-3 mx-auto bg-light rounded-3">
            <div class="d-flex flex-row align-items-center justify-content-center">
                <h1>Suck-ees is hiring!</h1>
            </div>
            <form id="applicant">
                <fieldset>
                    <legend>Apply Now!</legend>
                    <div class="form-group d-flex flex-row justify-content-between align-content-center mb-3">
                        <div class="form-floating w-40">
                            <input type="text" class="form-control" id="firstName" placeholder="John" required>
                            <label for="firstName">First Name</label>
                        </div>
                        <div class="form-floating w-40">
                            <input type="text" class="form-control" id="lastName" placeholder="Doe">
                            <label for="lastName">Last Name</label>
                        </div>
                        <div class="form-floating w-20">
                            <input type="number" class="form-control" id="age" placeholder="age" required>
                            <label for="age">Age</label>
                        </div>
                    </div>
                    <div class="form-group d-flex flex-row justify-content-between align-content-center">
                        <div class="form-floating w-50">
                            <input type="text" class="form-control" id="address1" placeholder="123 Street Name" required>
                            <label for="address1">Address Line 1</label>
                        </div>
                        <div class="form-floating w-50">
                            <input type="text" class="form-control" id="address2" placeholder="Ste 300">
                            <label for="address2">Address Line 2</label>
                        </div>
                    </div>
                    <div class="form-group d-flex flex-row justify-content-between align-content-center mb-3">
                        <div class="form-floating w-33">
                            <input type="text" class="form-control" id="city" placeholder="City" required>
                            <label for="city">City</label>
                        </div>
                        <div class="form-floating w-33">
                            <select class="form-select" id="state" required>
                                <option class="disabled" disabled selected>-- State --</option>
                                <option value="AL">Alabama</option>
                                <option value="AK">Alaska</option>
                                <option value="AZ">Arizona</option>
                                <option value="AR">Arkansas</option>
                            </select>
                            <label for="state">State</label>
                        </div>
                        <div class="form-floating w-33">
                            <input type="number" class="form-control" id="zip" placeholder="12345" required>
                            <label for="zip">Zip</label>
                        </div>
                    </div>
                    <div class="form-group d-flex flex-row justify-content-between align-content-center mb-3">
                        <div class="form-floating w-60">
                            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                            <label for="email">Email</label>
                        </div>
                        <div class="form-floating w-40">
                            <input type="tel" class="form-control" id="phone" placeholder="123-45-678" required>
                            <label for="phone">Phone Number</label>
                        </div>
                    </div>
                    <div class="form-group d-flex flex-row justify-content-between align-content-center mb-3">
                        <div class="form-floating w-50">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                            <label for="password">Password</label>
                        </div>
                    </div>
                    <div class="form-group d-flex flex-row justify-content-start align-content-center mb-3">
                        <fieldset class="form-group">
                            <legend>Marital Status</legend>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="maritalStatus" id="married" value="married">
                                <label class="form-check-label" for="married">Married</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="maritalStatus" id="single" value="single">
                                <label class="form-check-label" for="single">Single</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="maritalStatus" id="widowed" value="widowed">
                                <label class="form-check-label" for="widowed">Widowed</label>
                            </div>
                        </fieldset>
                    </div>
                    <div class="form-group d-flex flex-row justify-content-between align-content-center mb-3">
                        <fieldset class="form-group">
                            <legend>Favorite Colors</legend>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="colors" id="fav-color-red" value="red">
                                <label class="form-check-label" for="fav-color-red">Red</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="colors" id="fav-color-orange" value="orange">
                                <label class="form-check-label" for="fav-color-orange">Orange</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="colors" id="fav-color-yellow" value="yellow">
                                <label class="form-check-label" for="fav-color-yellow">Yellow</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="colors" id="fav-color-green" value="green">
                                <label class="form-check-label" for="fav-color-green">Green</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="colors" id="fav-color-blue" value="blue">
                                <label class="form-check-label" for="fav-color-blue">Blue</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="colors" id="fav-color-purple" value="purple">
                                <label class="form-check-label" for="fav-color-purple">Purple</label>
                            </div>
                        </fieldset>
                    </div>
                    <div class="form-group d-flex flex-row justify-content-between align-content-center mb-3">
                        <div class="form-floating w-50">
                            <textarea class="form-control w-100" id="addedInfo" placeholder="Notes" style="min-height: 120px;"></textarea>
                            <label for="addedInfo">Additional Info</label>
                        </div>
                    </div>

                    <div class="d-flex flex-row justify-content-center align-content-center">
                        <button type="submit" class="btn btn-outline-primary me-3"><i class="fa-solid fa-check"></i> Submit</button><!--============= Font Awesome =============-->
                        <button type="reset" class="btn btn-outline-danger"><i class="fa-solid fa-refresh"></i> Reset</button><!--============= Font Awesome =============-->
                    </div>
                </fieldset>
            </form>
        </div>
